/* ===== MINPAKU QUEST 3.0.1 EMERGENCY INPUT FIX ===== */
:root{
  --line:#89e8ff;
  --accent:#85efb6;
  --gold:#ffe27a;
  --ink:#06111c;
}
body{
  background:
    radial-gradient(circle at 50% -10%,#214c6c 0,#0b2032 34%,#040b12 78%);
}
#app{width:min(100%,980px)}
header{
  padding:5px 4px 7px;
  border-bottom:1px solid rgba(137,232,255,.15);
}
h1{
  font-size:23px;
  text-shadow:0 0 18px rgba(137,232,255,.38);
}
#stage{
  border:2px solid #8eeaff;
  background:#07121c;
  box-shadow:0 16px 48px rgba(0,0,0,.52),inset 0 0 34px rgba(89,201,235,.08);
}
#stage::after{
  content:"";
  position:absolute;inset:0;z-index:9;pointer-events:none;
  background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:100% 4px;
}
.mobile-tools{position:relative;z-index:90}
.mobile-tools button{
  border:1px solid #6f96ac;
  background:linear-gradient(#304d64,#20394e);
  box-shadow:inset 0 1px rgba(255,255,255,.12),0 4px 12px rgba(0,0,0,.25);
}
#bgmHeaderBtn.playing{
  background:linear-gradient(#91f3bf,#5bd592);
  color:#062015;border-color:#d9ffe9;
}
#floatingBgmBtn{display:none!important}
#nextGuide{
  left:8px;right:8px;top:27px;
  transform:none;
  max-width:none;
  text-align:left;
  padding:7px 11px 7px 34px;
  background:rgba(3,12,20,.94);
  border:1px solid #ffe27a;
  box-shadow:0 5px 15px rgba(0,0,0,.4);
  font-size:11px;
}
#nextGuide::before{
  content:"◆";
  position:absolute;left:12px;color:#ffe27a;
  animation:questPulse .9s ease-in-out infinite alternate;
}
#directionGuide{
  position:absolute;z-index:13;top:66px;left:9px;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(5,20,31,.93);
  border:1px solid rgba(137,232,255,.75);
  color:#d9f8ff;
  font-size:10px;font-weight:800;
  pointer-events:none;
}
@keyframes questPulse{to{filter:drop-shadow(0 0 7px #ffe27a);transform:scale(1.12)}}
.dialog{
  min-height:118px;
  background:linear-gradient(180deg,rgba(6,18,29,.98),rgba(3,10,17,.985));
  box-shadow:0 10px 28px rgba(0,0,0,.5),inset 0 0 20px rgba(137,232,255,.04);
}
#speaker{font-size:14px}
.side-panel,.panel{
  background:linear-gradient(180deg,rgba(18,40,56,.995),rgba(7,20,31,.995));
  box-shadow:0 18px 50px rgba(0,0,0,.48);
}

  font-size:31px;letter-spacing:.13em;
  color:#e9fcff;text-shadow:0 0 16px rgba(137,232,255,.45);
}
.title-mark{filter:drop-shadow(0 0 9px rgba(255,226,122,.55))}
#controls{margin-top:12px}
.dpad button,.actions button{
  box-shadow:inset 0 0 0 2px rgba(137,175,202,.55),0 5px 12px rgba(0,0,0,.24);
}
.actions .primary{
  background:linear-gradient(135deg,#9af2c3,#65dc9e);
}

<script>
(function(){
  document.documentElement.classList.add("mq-boot");

  function byId(id){ return document.getElementById(id); }

  window.MQ3 = {
    closeTitle: function(){
      var title=byId("titleScreen");
      if(title) title.style.display="none";
      document.body.classList.remove("mq-launch");
      document.body.classList.remove("title-open");
    },

    newGame: function(){
      try{
        if(typeof resetState==="function") resetState();
        this.closeTitle();
        var setup=byId("setupScreen");
        if(setup){
          setup.classList.remove("hidden");
          setup.style.display="";
        }
      }catch(err){
        console.error(err);
        alert("開始処理エラー: "+err.message);
      }
    },

    continueGame: function(){
      try{
        var loaded=(typeof loadGame==="function") ? loadGame() : false;
        if(loaded){
          this.closeTitle();
          if(typeof toast==="function") toast("セーブデータを読み込みました");
        }else{
          alert("セーブデータがありません");
        }
      }catch(err){
        console.error(err);
        alert("読込処理エラー: "+err.message);
      }
    },

    enableAudio: function(){
      var audio=byId("bgmAudio");
      var btn=byId("v3AudioBtn");
      if(!audio){ alert("音声プレイヤーが見つかりません"); return; }
      audio.volume=.8;
      var p=audio.play();
      if(p && p.then){
        p.then(function(){
          if(btn) btn.textContent="🔊 音楽 ON";
        }).catch(function(){
          var box=byId("v3Fallback");
          if(box) box.classList.remove("hidden");
          alert("下の標準再生ボタンを一度押してください");
        });
      }
    },

    toggleFallback: function(){
      var box=byId("v3Fallback");
      if(box) box.classList.toggle("hidden");
    }
  };

  document.addEventListener("DOMContentLoaded",function(){
    document.body.classList.add("mq-launch");

    // Also attach direct listeners as a second route.
    var buttons=document.querySelectorAll("#titleScreen button");
    buttons.forEach(function(btn){
      btn.style.pointerEvents="auto";
    });
  });
})();
</script>

function updateBgmUi(){
 const playing=bgmAudio && !bgmAudio.paused;
 bgmOn=playing;
 if(floatingBgmBtn){
  floatingBgmBtn.textContent=playing?"🔊 BGM ON":"♪ BGM";
  floatingBgmBtn.classList.toggle("playing",playing);
 }
 const status=document.getElementById("bgmStatus");
 if(status)status.textContent=playing?"現在：再生中":"現在：停止中";
}
async function startRealAudio(){
 if(!bgmAudio)return false;
 try{
  bgmAudio.volume=0.75;
  await bgmAudio.play();
  updateBgmUi();
  toast("BGMを再生しました");
  return true;
 }catch(err){
  console.error("HTMLAudio play failed",err);
  updateBgmUi();
  toast("画面下の再生ボタンを直接押してください");
  return false;
 }
}
function stopRealAudio(){
 if(!bgmAudio)return;
 bgmAudio.pause();
 updateBgmUi();
 toast("BGMを停止しました");
}
async function toggleBgm(event){
 if(event){event.preventDefault();event.stopPropagation();}
 if(!bgmAudio)return;
 if(bgmAudio.paused)await startRealAudio();
 else stopRealAudio();
}
if(floatingBgmBtn)floatingBgmBtn.onclick=toggleBgm;
if(menuBgm)menuBgm.onclick=toggleBgm;
if(bgmAudio){
 bgmAudio.addEventListener("play",updateBgmUi);
 bgmAudio.addEventListener("pause",updateBgmUi);
 bgmAudio.addEventListener("error",()=>toast("音声ファイルを読み込めませんでした"));
}
updateBgmUi();

function setPortrait(speaker,text=""){
 const p=document.getElementById("portrait"),face=document.getElementById("portraitFace");
 if(!p||!face)return;
 const names={"村長":"mayor","旅の行政書士":"admin","リナ":"rina","ケン":"ken","サラ":"sara","エマ":"emma","清掃スタッフ":"cleaner"};
 p.className="portrait "+(names[speaker]||"admin");
 let mood="neutral",mark="●‿●";
 if(/困|不安|苦情|危険|失敗|トラブル|足り/.test(text)){mood="worry";mark="●︵●";}
 else if(/！|驚|なんと|合格|成功|ありがとう|おめでとう/.test(text)){mood="surprise";mark="●o●";}
 else if(/うれ|笑|良かった|大丈夫|人気|歓迎/.test(text)){mood="happy";mark="●ᴗ●";}
 p.classList.add(mood);face.textContent=mark;
}

window.runBusinessDay=function(){
 state.day=(state.day||1)+1;
 const quality=((state.cleanliness||70)+(state.neighbors||70))/2;
 let newBookings=Math.max(1,Math.round(quality/25+Math.random()*3));
 let income=newBookings*(9000+Math.round((state.review||3.5)*1200));
 let event="穏やかな一日。ゲストは町歩きを楽しんだ。";
 const roll=Math.random();
 if(roll<.18){
  if((state.cleanliness||70)>=80){
   state.review=Math.min(5,(state.review||4)+.12);
   income+=8000;event="ゲストから『清掃が完璧！』と高評価。追加予約も入った。";
  }else{
   state.review=Math.max(1,(state.review||4)-.25);
   income-=5000;event="髪の毛の清掃漏れが見つかり、レビューが下がった。";
  }
 }else if(roll<.34){
  if((state.neighbors||70)>=75){
   state.trust+=1;event="近隣住民が迷っていたゲストを案内してくれた。";
  }else{
   state.neighbors=Math.max(0,(state.neighbors||70)-8);
   state.review=Math.max(1,(state.review||4)-.15);
   event="夜間騒音の苦情が発生。近隣関係が悪化した。";
  }
 }else if(roll<.48){
  newBookings+=2;income+=18000;event="SNSで宿の写真が話題になり、予約が急増した！";
 }
 state.bookings=(state.bookings||0)+newBookings;
 state.money=Math.max(0,state.money+income);
 state.village+=Math.max(1,Math.floor(newBookings/2));
 if(!state.review)state.review=4.0;
 const record=`${state.day}日目：${event}<br>予約 +${newBookings}件／売上 ${income.toLocaleString()}G`;
 state.operationHistory=state.operationHistory||[];
 state.operationHistory.push(record);
 if(state.operationHistory.length>12)state.operationHistory.shift();
 saveGame(false);updateStats();toast(`${newBookings}件の予約・${income.toLocaleString()}G`);openManagement();
};
window.managementAction=function(kind){
 let msg="";
 if(kind==="clean"){
  if(state.money<10000){toast("資金が足りません");return;}
  state.money-=10000;state.cleanliness=Math.min(100,(state.cleanliness||70)+15);
  state.review=Math.min(5,(state.review||4)+.15);msg="清掃品質とレビューが上がりました";
 }else if(kind==="guide"){
  if(state.money<5000){toast("資金が足りません");return;}
  state.money-=5000;state.bookings=(state.bookings||0)+2;state.trust+=1;msg="予約と信頼が増えました";
 }else{
  if(state.money<3000){toast("資金が足りません");return;}
  state.money-=3000;state.neighbors=Math.min(100,(state.neighbors||70)+18);state.trust+=1;msg="近隣関係が改善しました";
 }
 saveGame(false);updateStats();toast(msg);openManagement();
};

function talkTo(id){
 if(state.ending)return;
 const c=state.chapter,s=state.step;
 if(id!==currentTarget()){const generic={mayor:"村の未来を頼んだぞ。",admin:"順番を守れば、失敗は減らせる。",rina:"契約前の確認が大切です。",ken:"消防は命を守る準備だ。",sara:"衛生設備も忘れずに。",emma:"宿ができて村が賑やかになったね。",mori:"資金計画は余裕を持って。",cleaner:"清掃品質はレビューに直結します。",child:"観光客が増えてうれしい！"};openDialog(npcs.find(n=>n.id===id)?.name||"村人",[generic[id]||"こんにちは。"]);return;}
 if(c===0){
  if(s===0)openDialog("村長",[`${state.name}、この村には泊まる場所がない。`,"民泊を作り、村を蘇らせてほしい。",()=>showChoice("引き受けますか？",[

   {label:"不安だけど挑戦する",action:()=>{state.trust++;nextStep();state.dialogQueue=["その勇気があれば大丈夫だ。"];showNextDialog();}}
  ])]);
  else if(s===1)openDialog("村長",["支度金100,000Gを受け取ってくれ。",()=>{state.money+=100000;toast("100,000Gを手に入れた！");nextStep();state.dialogQueue=["中央広場の白髪の旅人に会うといい。"];showNextDialog();}]);
  else if(s===2)openDialog("旅の行政書士",["その物件、まだ契約していないだろうな。","営業できるか確認する前に契約するな。","まず空き家紹介所、次に消防と保健所だ。",()=>{state.knowledge+=2;nextStep();showNextDialog();}]);
  else if(s===3)openDialog("リナ",["候補物件の資料を用意しました。","契約前に消防と保健所へ相談してください。",()=>{state.knowledge++;nextStep();showNextDialog();}]);
  else if(s===4)openDialog("ケン",["避難経路、警報器、消火器を確認します。","大きな問題はなさそうです。",()=>{state.knowledge+=2;nextStep();showNextDialog();}]);
  else if(s===5)openDialog("サラ",["非常用照明についても確認しましょう。",`${state.name}「消防では言われなかったのに？」`,"非常用照明は建築基準法で求められる安全措置なので、消防相談だけでは求められないことがあります。",()=>{state.knowledge+=2;nextStep();showNextDialog();}]);
  else openDialog("旅の行政書士",["事前相談は完了だ。","次は候補物件を比較する。",()=>{state.trust++;nextStep();showNextDialog();}]);
 } else if(c===1) propertyEvent();
 else if(c===2) fireEvent();
 else if(c===3) healthEvent();
 else if(c===4) openingEvent();
 else if(c===5) troubleEvent(s);
 else if(c===6) limitEvent();
 else if(c===7){
   if(s===0)openDialog("村長",["宿ができ、観光客が増え、店にも明かりが戻った。","君がこの村を変えたんだ。",()=>{state.village+=15;nextStep();showNextDialog();}]);
   else openDialog("旅の行政書士",["……この村はもう大丈夫だ。",`${state.name}「名前くらい教えてください。」`,"名前に意味はない。","まだ宿のない町がある。",()=>ending()]);
 }
}

function front(){const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[state.player.dir];return{x:state.player.x+d[0],y:state.player.y+d[1]};}
function talk(){if(!state.started||state.ending)return;if(state.dialogOpen){showNextDialog();return;}const f=front(),n=npcs.find(n=>n.x===f.x&&n.y===f.y);if(n)talkTo(n.id);else toast("近くに話せる相手はいません");}
function solid(x,y){if(x<0||y<0||x>=MAP_W||y>=MAP_H)return true;if(water.has(`${x},${y}`))return true;if(trees.some(t=>t[0]===x&&t[1]===y))return true;if(buildings.some(b=>x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h))return true;if(npcs.some(n=>n.x===x&&n.y===y))return true;return false;}
function move(dx,dy,dir){if(!state.started||state.dialogOpen||!eventPanel.classList.contains("hidden"))return;state.player.dir=dir;const nx=state.player.x+dx,ny=state.player.y+dy;if(!solid(nx,ny)){state.player.x=nx;state.player.y=ny;state.walkFrame^=1;}}

function portraitMode(){
 return matchMedia("(max-width:700px) and (orientation:portrait)").matches;
}
function configureCanvas(){
 const portrait=portraitMode();
 const targetW=portrait?320:512;
 if(canvas.width!==targetW||canvas.height!==320){
  canvas.width=targetW;
  canvas.height=320;
  ctx.imageSmoothingEnabled=false;
 }
}
function cameraX(){
 if(!portraitMode())return 0;
 const desired=(state.player.x-10)*TILE;
 return Math.max(0,Math.min(MAP_W*TILE-canvas.width,desired));
}
function draw(){
 configureCanvas();
 updateGuide();
 const viewW=canvas.width;
 ctx.clearRect(0,0,viewW,320);
 if(!ready){
  ctx.fillStyle="#09131c";ctx.fillRect(0,0,viewW,320);
  ctx.fillStyle="#d3f6ff";ctx.font="bold 14px sans-serif";ctx.textAlign="center";
  ctx.fillText("ユリイカ村を読み込み中…",viewW/2,145);
  ctx.font="11px sans-serif";ctx.fillText(`${assetLoaded} / ${Object.keys(ASSET_DATA).length}`,viewW/2,166);
  ctx.textAlign="left";requestAnimationFrame(draw);return;
 }
 const cam=cameraX();
 ctx.save();
 ctx.translate(-cam,0);
 for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
  ctx.drawImage(assets.grass,x*TILE,y*TILE);
  if(roads.has(`${x},${y}`))ctx.drawImage(assets.road,x*TILE,y*TILE);
  if(water.has(`${x},${y}`))ctx.drawImage(assets[Math.floor(Date.now()/500)%2?"water1":"water0"],x*TILE,y*TILE);
  if(!roads.has(`${x},${y}`)&&!water.has(`${x},${y}`)&&((x*13+y*7)%17===0)){
   ctx.fillStyle="rgba(205,241,143,.32)";ctx.fillRect(x*TILE+3,y*TILE+5,2,1);ctx.fillRect(x*TILE+10,y*TILE+11,1,2);
  }
 }
 drawVillageChanges();
 drawPlaza();
 flowers.forEach(([x,y])=>ctx.drawImage(assets.flower,x*TILE,y*TILE));
 benches.forEach(([x,y])=>ctx.drawImage(assets.bench,x*TILE,y*TILE));
 lamps.forEach(([x,y])=>ctx.drawImage(assets.lamp,x*TILE,y*TILE));
 trees.forEach(([x,y])=>ctx.drawImage(assets.tree,x*TILE,y*TILE-4));
 buildings.forEach(b=>{
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.28)";ctx.shadowBlur=5;ctx.shadowOffsetY=3;
  ctx.drawImage(assets[b.kind],b.x*TILE,b.y*TILE);
  ctx.restore();
 });
 buildings.forEach(b=>label(b.name,(b.x+b.w/2)*TILE,(b.y+1)*TILE));
 npcs.forEach(drawNpc);
 drawPlayer();
 ctx.restore();
 drawTopBar();
 requestAnimationFrame(draw);
}
function drawVillageChanges(){
 // stone bridge and river bank detail
 ctx.fillStyle="#6f8790";ctx.fillRect(14*TILE,18*TILE,5*TILE,TILE);
 for(let x=14;x<=18;x++){ctx.fillStyle=x%2?"#aebdc0":"#92a6aa";ctx.fillRect(x*TILE,18*TILE,TILE,TILE);}
 ctx.strokeStyle="rgba(30,48,55,.55)";ctx.lineWidth=1;
 for(let x=14;x<=19;x++)ctx.beginPath(),ctx.moveTo(x*TILE,18*TILE),ctx.lineTo(x*TILE,19*TILE),ctx.stroke();
 if(state.chapter>=4){for(const [x,y] of [[3,8],[29,8],[8,16]])ctx.drawImage(assets.guest,x*TILE,y*TILE);}
 if(state.chapter>=7){for(const [x,y] of [[5,1],[27,1],[2,17],[29,17]])ctx.drawImage(assets.flower,x*TILE,y*TILE);}
}
function drawPlaza(){
 ctx.fillStyle="#d6c68e";ctx.fillRect(13*TILE,7*TILE,7*TILE,8*TILE);
 ctx.fillStyle="#8d7c58";ctx.fillRect(15*TILE,9*TILE,3*TILE,3*TILE);
 ctx.fillStyle="#b9d7df";ctx.fillRect(15*TILE+5,9*TILE+4,38,38);
 ctx.fillStyle="#2d87ad";ctx.fillRect(15*TILE+10,9*TILE+9,28,28);
 ctx.fillStyle="#8fe2ef";ctx.fillRect(16*TILE-2,9*TILE-5,4,17);
 ctx.fillStyle="rgba(255,255,255,.55)";ctx.fillRect(16*TILE,9*TILE-7,2,13);
}
function drawNpc(n){const img=assets[n.asset],sx=(Math.floor(Date.now()/450)%2)*16;ctx.drawImage(img,sx,0,16,16,n.x*TILE,n.y*TILE,16,16);if(n.id===currentTarget()){
 const bob=Math.floor(Date.now()/300)%2;
 ctx.fillStyle="#ffe56f";ctx.strokeStyle="#4b3610";ctx.lineWidth=1;
 ctx.beginPath();
 ctx.moveTo(n.x*TILE+8,n.y*TILE-11-bob);
 ctx.lineTo(n.x*TILE+14,n.y*TILE-5-bob);
 ctx.lineTo(n.x*TILE+8,n.y*TILE+1-bob);
 ctx.lineTo(n.x*TILE+2,n.y*TILE-5-bob);
 ctx.closePath();ctx.fill();ctx.stroke();
 ctx.fillStyle="rgba(4,11,18,.9)";
 ctx.fillRect(n.x*TILE-2,n.y*TILE-20-bob,20,7);
 ctx.fillStyle="#ffe56f";ctx.font="bold 6px sans-serif";ctx.textAlign="center";
 ctx.fillText("NEXT",n.x*TILE+8,n.y*TILE-14-bob);ctx.textAlign="left";
}}
function drawPlayer(){
 ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.ellipse(state.player.x*TILE+8,state.player.y*TILE+15,6,2,0,0,Math.PI*2);ctx.fill();
 ctx.drawImage(assets.player,state.walkFrame*16,0,16,16,state.player.x*TILE,state.player.y*TILE,16,16);
}
function label(t,x,y){
 ctx.save();ctx.font="bold 7px sans-serif";
 const w=Math.min(72,ctx.measureText(t).width+12),h=13;
 const px=Math.round(x-w/2),py=Math.round(y);
 ctx.fillStyle="rgba(5,15,24,.94)";ctx.strokeStyle="rgba(137,232,255,.82)";ctx.lineWidth=1;
 ctx.beginPath();if(ctx.roundRect)ctx.roundRect(px,py,w,h,4);else ctx.rect(px,py,w,h);ctx.fill();ctx.stroke();
 ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(t,x,py+h/2+.5);ctx.restore();
}
function drawTopBar(){
 const w=canvas.width;
 ctx.fillStyle="rgba(0,0,0,.74)";
 ctx.fillRect(0,0,w,18);
 ctx.fillStyle="#fff";
 ctx.font="9px monospace";
 const ch=chapters[Math.min(state.chapter,chapters.length-1)];
 const mission=ch.steps[Math.min(state.step,ch.steps.length-1)];
 const shortMission=mission.length>17?mission.slice(0,17)+"…":mission;
 ctx.fillText(`MISSION: ${shortMission}`,5,12);
 ctx.textAlign="right";
 ctx.fillText("ユリイカ村",w-5,12);
 ctx.textAlign="left";
}


function updateGuide(){
 const targetId=currentTarget(),target=npcs.find(n=>n.id===targetId);
 const guide=document.getElementById("nextGuide"),dirGuide=document.getElementById("directionGuide");
 if(!guide)return;
 if(state.ending){guide.textContent="物語は完結しました";if(dirGuide)dirGuide.textContent="END";return;}
 if(!target){guide.textContent="クエスト画面を確認しよう";if(dirGuide)dirGuide.textContent="目的地なし";return;}
 const dx=target.x-state.player.x,dy=target.y-state.player.y;
 const dist=Math.abs(dx)+Math.abs(dy);
 const dirs=[];
 if(dy<0)dirs.push("上");if(dy>0)dirs.push("下");if(dx<0)dirs.push("左");if(dx>0)dirs.push("右");
 guide.textContent=`次は「${target.name}」に話しかけよう`;
 if(dirGuide)dirGuide.textContent=`${dirs.join("・")||"すぐ近く"}／あと約${dist}マス`;
}

function renderQuest(){
 const ch=chapters[Math.min(state.chapter,chapters.length-1)];
 const targetId=currentTarget();
 const target=npcs.find(n=>n.id===targetId);
 questTitle.textContent=ch.title+(target?`｜次：${target.name}`:"");questList.innerHTML="";ch.steps.forEach((q,i)=>{const r=document.createElement("div");r.className="quest-row "+(i<state.step?"quest-done":i===state.step?"quest-current":"");r.textContent=(i<state.step?"✓ ":i===state.step?"▶ ":"□ ")+q;questList.appendChild(r);});}

/* ===== VERSION 3.0.1 TITLE CONTROLLER ===== */
(function(){
 const title=document.getElementById("titleScreen");
 const setup=document.getElementById("setupScreen");
 const oldNew=document.getElementById("newGameBtn");
 const oldContinue=document.getElementById("continueBtn");
 const oldSilent=document.getElementById("silentBtn");
 const oldAudio=document.getElementById("audioEnableBtn");
 const oldFallback=document.getElementById("audioFallbackBtn");
 const fallbackArea=document.getElementById("audioFallbackArea");
 const audio=document.getElementById("bgmAudio");

 function fresh(el){
  const n=el.cloneNode(true);
  el.parentNode.replaceChild(n,el);
  return n;
 }
 const newBtn=fresh(oldNew);
 const continueBtn=fresh(oldContinue);
 const silentBtn=fresh(oldSilent);
 const audioBtn=fresh(oldAudio);
 const fallbackBtn=fresh(oldFallback);

 document.body.classList.add("title-open");

 function closeTitle(){
  title.classList.add("hidden");
  document.body.classList.remove("title-open");
 }
 async function beginNew(withAudio){
  if(withAudio)await startRealAudio();
  resetState();
  closeTitle();
  setup.classList.remove("hidden");
 }
 async function beginContinue(){
  await startRealAudio();
  if(loadGame()){
   closeTitle();
   toast("セーブデータを読み込みました");
  }else toast("セーブデータがありません");
 }
 function bind(el,fn){
  let busy=false;
  const run=async(e)=>{
   e.preventDefault();e.stopPropagation();
   if(busy)return;
   busy=true;
   try{await fn();}finally{setTimeout(()=>busy=false,300);}
  };
  el.addEventListener("touchend",run,{passive:false});
  el.addEventListener("click",run,{passive:false});
 }
 bind(newBtn,()=>beginNew(true));
 bind(continueBtn,beginContinue);
 bind(silentBtn,()=>beginNew(false));
 bind(audioBtn,async()=>{
  const ok=await startRealAudio();
  if(ok){audioBtn.textContent="🔊 音楽 ON";audioBtn.classList.add("enabled");}
 });
 bind(fallbackBtn,()=>{
  fallbackArea.classList.toggle("hidden");
  fallbackBtn.textContent=fallbackArea.classList.contains("hidden")?"音が出ないとき":"標準プレイヤーを閉じる";
 });
 if(audio)audio.addEventListener("play",()=>{audioBtn.textContent="🔊 音楽 ON";audioBtn.classList.add("enabled");});
})();




</script>
