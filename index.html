<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>OPERATION HERMES v1.5</title><style>
:root{--bg:#0c1420;--panel:#172536;--line:#9bdcff;--txt:#f7fbff;--accent:#5ee59a;--warn:#ffcf5a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:linear-gradient(#0c1420,#111d2d);color:var(--txt);font-family:ui-monospace,Consolas,monospace;overflow:hidden}#wrap{max-width:480px;height:100%;margin:auto;padding:7px;display:flex;flex-direction:column}header{display:flex;justify-content:space-between;align-items:center;gap:8px;height:48px}h1{font-size:17px;margin:0;color:#c7efff}#status{font-size:10px;text-align:right;line-height:1.35}.topbtn{border:1px solid #6386a5;background:#22364b;color:white;border-radius:8px;padding:6px 8px}#gamebox{position:relative;flex:1;min-height:280px;border:2px solid var(--line);border-radius:11px;overflow:hidden;background:#000}canvas{width:100%;height:100%;display:block;image-rendering:pixelated}.hud{position:absolute;top:6px;left:6px;right:6px;background:rgba(5,10,16,.82);border:1px solid #7aa7c9;border-radius:7px;padding:6px 8px;font-size:11px;z-index:3}.marker{color:#ffe36e;font-weight:bold}#dialog,#panel{position:absolute;inset:auto 8px 8px 8px;background:rgba(10,18,29,.97);border:2px solid #fff;border-radius:9px;padding:11px;z-index:6;font-size:13px;line-height:1.55;max-height:72%;overflow:auto}#dialog{display:none}.name{color:#8ed7ff;font-weight:bold;margin-bottom:4px}.hint{font-size:10px;color:#aab9c6;text-align:right;margin-top:6px}#panel{display:none;inset:12px}.choices button,.panelbtn{display:block;width:100%;margin:7px 0;padding:11px;border:0;border-radius:8px;background:#35516d;color:white;font-weight:bold}.choices button.good{background:#26784d}.choices button.bad{background:#874343}#overlay{position:absolute;inset:0;background:rgba(3,8,14,.97);z-index:10;display:flex;align-items:center;justify-content:center;padding:20px}.card{width:100%;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:18px;text-align:center}.card h2{margin:0 0 8px;color:#c7efff}.card button{width:100%;padding:13px;border:0;border-radius:8px;background:var(--accent);font-weight:bold;font-size:16px}#controls{height:146px;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:7px}#dpad{position:relative}.ctrl{position:absolute;width:52px;height:52px;border:0;border-radius:10px;background:#273b50;color:#fff;font-size:22px;box-shadow:inset 0 0 0 2px #506b84}#up{left:52px}#left{left:0;top:52px}#down{left:52px;top:52px}#right{left:104px;top:52px}#actions{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:8px}.action{width:104px;height:48px;border:0;border-radius:25px;font-weight:bold}#talk{background:var(--accent)}#menu{background:#405b75;color:white}#bgm{background:#755c40;color:white}@media(max-height:650px){#controls{height:116px}.ctrl{width:44px;height:44px}#up{left:44px}#left{top:44px}#down{left:44px;top:44px}#right{left:88px;top:44px}.action{height:36px}}
</style></head><body><div id="wrap"><header><h1>OPERATION HERMES v1.5</h1><div id="status"></div></header><div id="gamebox"><canvas id="game" width="320" height="240"></canvas><div class="hud" id="hud"></div><div id="dialog"><div class="name"></div><div class="text"></div><div class="hint">タップ / TALKで進む</div></div><div id="panel"></div><div id="overlay"><div class="card"><h2>OPERATION HERMES</h2><p>遊びながら民泊開業を学ぶRPG</p><p style="font-size:11px;color:#b8c5d0">黄色い◆が付いた人物に話しかけよう。<br>スマホは画面下の十字キーで操作できます。</p><button id="start">作戦開始</button></div></div></div><div id="controls"><div id="dpad"><button class="ctrl" id="up">▲</button><button class="ctrl" id="left">◀</button><button class="ctrl" id="down">▼</button><button class="ctrl" id="right">▶</button></div><div id="actions"><button class="action" id="talk">TALK</button><button class="action" id="menu">MISSION</button><button class="action" id="bgm">BGM OFF</button></div></div></div><script>
const c=document.getElementById('game'),x=c.getContext('2d');x.imageSmoothingEnabled=false;const T=16,C=20,R=15;let started=false,dialog=false,q=[],step=0,bgmOn=false,audio=null;const st={money:100,knowledge:0,trust:0,reviews:5,revenue:0};const missions=['町長に話しかける','空き家紹介所の物件屋に話す','消防署で事前相談する','保健所のクイズに答える','旅の行政書士に話す','宿の運営方針を決める','清掃トラブルに対応する','近隣苦情に対応する','エンディング'];
const map=["####################","#..................#","#..AAA......FFF....#","#..AAA......FFF....#","#..................#","#~~~~....====......#","#~~~~....====......#","#..................#","#..HHH......TTT....#","#..HHH......TTT....#","#..................#","#.......GGGG.......#","#.......GGGG.......#","#..................#","####################"];
const b={A:{n:'空き家紹介所',px:3,py:2,w:3,h:2,col:'#c99b62'},F:{n:'消防署',px:13,py:2,w:3,h:2,col:'#cf5d55'},H:{n:'保健所',px:3,py:8,w:3,h:2,col:'#e3edf5'},T:{n:'酒場',px:13,py:8,w:3,h:2,col:'#986b55'},G:{n:'民泊・旅館ギルド',px:8,py:11,w:4,h:2,col:'#657bc4'}};
const p={px:10,py:13,dir:'up',col:'#62e7a0'};const people=[{id:'mayor',n:'村長',px:10,py:10,col:'#f0c36e'},{id:'agent',n:'物件屋',px:5,py:5,col:'#8ed7ff'},{id:'fire',n:'消防士',px:15,py:5,col:'#ff8177'},{id:'health',n:'保健所職員',px:5,py:11,col:'#fff'},{id:'hermes',n:'旅の行政書士',px:9,py:10,col:'#ddd',white:true},{id:'host',n:'先輩ホスト',px:15,py:11,col:'#c08cff'}];
function target(){return ['mayor','agent','fire','health','hermes','host','host','hermes',null][step]}
function status(){document.getElementById('status').innerHTML=`資金 ${st.money}万G<br>知識 ${st.knowledge} 信頼 ${st.trust}`;document.getElementById('hud').innerHTML=`目的：<span class="marker">◆ ${missions[step]}</span>`}status();
function solid(px,py){if(px<1||py<1||px>=19||py>=14)return true;for(const z of Object.values(b))if(px>=z.px&&px<z.px+z.w&&py>=z.py&&py<z.py+z.h)return true;return people.some(n=>n.px===px&&n.py===py)}function mv(dx,dy,d){if(!started||dialog||panelOpen())return;p.dir=d;let nx=p.px+dx,ny=p.py+dy;if(!solid(nx,ny)){p.px=nx;p.py=ny}}
function front(){let dx=0,dy=0;if(p.dir==='up')dy=-1;if(p.dir==='down')dy=1;if(p.dir==='left')dx=-1;if(p.dir==='right')dx=1;return{px:p.px+dx,py:p.py+dy}}
function talk(){if(dialog){next();return}if(panelOpen())return;let f=front(),n=people.find(v=>v.px===f.px&&v.py===f.py);if(!n)return show('案内',['黄色い◆の人物の正面に立って話しかけてください。']);scene(n.id)}
function show(name,lines){q=lines.slice();dialog=true;let d=document.getElementById('dialog');d.style.display='block';d.querySelector('.name').textContent=name;next()}function next(){if(!q.length){dialog=false;document.getElementById('dialog').style.display='none';status();return}document.querySelector('#dialog .text').textContent=q.shift()}
function panelOpen(){return document.getElementById('panel').style.display==='block'}function choose(title,text,opts){let el=document.getElementById('panel');el.style.display='block';el.innerHTML=`<div class="name">${title}</div><p>${text}</p><div class="choices">${opts.map((o,i)=>`<button class="${o.cls||''}" onclick="pick(${i})">${o.t}</button>`).join('')}</div>`;window._opts=opts}function pick(i){document.getElementById('panel').style.display='none';window._opts[i].f()}
function advance(n=1){step=Math.min(8,step+n);status()}
function scene(id){if(id==='mayor'){if(step===0){advance();show('村長',['旅人が減り、村が元気を失っています。','空き家を宿にして、もう一度この村に人を呼んでください。'])}else show('村長',['村の未来をよろしくお願いします。'])}
else if(id==='agent'){if(step===1){choose('初めての物件','家賃は安いが、契約前の行政確認はまだです。どうする？',[{t:'契約前に消防・保健所へ相談する',cls:'good',f:()=>{st.knowledge+=2;advance();show('物件屋',['その判断が正解です。まず消防署へ行きましょう。'])}},{t:'安いので先に契約する',cls:'bad',f:()=>{st.money-=25;st.trust-=2;show('結果',['追加工事が判明。改修費25万G、開業も遅れました。','契約前確認の大切さを学び、消防署へ向かいます。']);advance()}}])}else show('物件屋',['契約前の確認が、一番安いリスク対策です。'])}
else if(id==='fire'){if(step===2){st.knowledge+=2;advance();show('消防士',['避難経路と火災報知機を確認します。','この物件は大きな問題はなさそうです。','次は保健所へ相談してください。'])}else show('消防士',['消防設備は宿泊者の命を守ります。'])}
else if(id==='health'){if(step===3){choose('保健所クイズ','民泊に必要なものをすべて含む選択肢はどれ？',[{t:'トイレ・お風呂・キッチン・洗面所／不在型なら管理業者／非常用照明などの安全措置',cls:'good',f:()=>{st.knowledge+=4;advance();show('保健所職員',['正解です。','非常用照明は建築基準法で求められていますので、消防では求められません。','背後に白髪の男が現れました。'])}},{t:'上記に加えて、客室内の噴水',cls:'bad',f:()=>{show('保健所職員',['噴水は不要です。必要設備と安全措置を整理しましょう。']);}}])}else show('保健所職員',['非常用照明は建築基準法上の安全措置です。'])}
else if(id==='hermes'){if(step===4){st.trust+=5;st.knowledge+=3;advance();show('旅の行政書士',['初めてなら、みんなここで止まります。','確認する順番を知れば、やり直しは減らせます。','次は実際の運営です。酒場の先輩ホストに会いましょう。'])}else if(step===7){choose('近隣から騒音苦情','深夜にグループ客が騒いでいます。どうする？',[{t:'すぐ連絡し、現地対応。翌日近隣にも報告する',cls:'good',f:()=>{st.trust+=5;st.reviews=Math.min(5,st.reviews+.2);advance();ending()}},{t:'レビューが怖いので朝まで様子を見る',cls:'bad',f:()=>{st.trust-=8;st.revenue-=20;advance();ending(true)}}])}else show('旅の行政書士',['黄色い◆の人物を追えば、次にすべきことが分かります。'])}
else if(id==='host'){if(step===5){choose('掲載後の価格設定','最初の予約をどう取る？',[{t:'地域相場を調べ、適正価格で開始',cls:'good',f:()=>{st.revenue+=30;st.trust+=2;advance();show('運営結果',['予約が入り、売上30万G。次は清掃トラブルです。'])}},{t:'とにかく高値で出す',cls:'bad',f:()=>{st.revenue+=5;st.trust-=2;advance();show('運営結果',['予約がほとんど入らず、売上は5万Gだけでした。'])}}])}else if(step===6){choose('清掃報告','チェックイン直前、浴室に髪の毛が残っていました。',[{t:'再清掃し、写真で完了確認',cls:'good',f:()=>{st.money-=2;st.trust+=3;advance();show('結果',['再清掃費2万G。低評価を防ぎました。','旅の行政書士に近隣対応を相談しましょう。'])}},{t:'少しくらいならそのまま',cls:'bad',f:()=>{st.reviews-=1.5;st.revenue-=10;advance();show('結果',['★2レビュー。売上低下と予約キャンセルが発生しました。'])}}])}else show('先輩ホスト',['運営は、小さな対応の積み重ねだよ。'])}}
function ending(bad=false){let el=document.getElementById('panel');el.style.display='block';el.innerHTML=`<div class="name">${bad?'事業継続の危機':'MISSION COMPLETE'}</div><h2>${bad?'近隣の信頼を失った…':'ハース村に旅人が戻った！'}</h2><p>売上：${st.revenue}万G<br>信頼：${st.trust}<br>レビュー：★${Math.max(1,st.reviews).toFixed(1)}</p><p>${bad?'苦情放置により営業停止リスクが高まりました。迅速な対応が民泊を守ります。':'知識と迅速な対応が、宿と地域の未来を守りました。'}</p><button class="panelbtn" onclick="location.reload()">もう一度遊ぶ</button>`}
function tile(i,j,ch){let px=i*T,py=j*T;if(ch==='#'){x.fillStyle='#263849';x.fillRect(px,py,T,T);x.fillStyle='#314b60';x.fillRect(px+2,py+2,12,12)}else if(ch==='~'){x.fillStyle='#2e75a5';x.fillRect(px,py,T,T);x.fillStyle='#72c7e5';x.fillRect(px,py+6,T,2)}else if(ch==='='){x.fillStyle='#9b7b50';x.fillRect(px,py,T,T);x.fillStyle='#d4ac70';x.fillRect(px,py+3,T,3)}else{x.fillStyle=(i+j)%2?'#6fa65f':'#78af67';x.fillRect(px,py,T,T)}}function building(z){let px=z.px*T,py=z.py*T,w=z.w*T,h=z.h*T;x.fillStyle=z.col;x.fillRect(px,py,w,h);x.fillStyle='#4b3229';x.fillRect(px,py,w,4);x.fillStyle='#1d2933';x.fillRect(px+w/2-5,py+h-11,10,11)}function char(n){let px=n.px*T,py=n.py*T;x.fillStyle='rgba(0,0,0,.25)';x.fillRect(px+3,py+13,10,2);x.fillStyle=n.col;x.fillRect(px+4,py+6,8,8);x.fillStyle='#efc5a4';x.fillRect(px+5,py+2,6,5);x.fillStyle=n.white?'#f4f4f4':'#49372f';x.fillRect(px+4,py+1,8,3)}function draw(){x.clearRect(0,0,320,240);for(let j=0;j<R;j++)for(let i=0;i<C;i++)tile(i,j,map[j][i]);Object.values(b).forEach(building);people.forEach(n=>{char(n);if(n.id===target()){x.fillStyle='#ffe36e';x.font='bold 14px monospace';x.fillText('◆',n.px*T+2,n.py*T-2)}});char(p);requestAnimationFrame(draw)}draw();
[['up',0,-1,'up'],['down',0,1,'down'],['left',-1,0,'left'],['right',1,0,'right']].forEach(([id,dx,dy,d])=>{let e=document.getElementById(id),tm;let go=v=>{v.preventDefault();mv(dx,dy,d);tm=setInterval(()=>mv(dx,dy,d),150)},stop=v=>{v.preventDefault();clearInterval(tm)};e.addEventListener('mousedown',go);e.addEventListener('mouseup',stop);e.addEventListener('mouseleave',stop);e.addEventListener('touchstart',go,{passive:false});e.addEventListener('touchend',stop,{passive:false})});document.getElementById('talk').onclick=talk;document.getElementById('dialog').onclick=next;document.getElementById('menu').onclick=()=>show('MISSION',[missions[step]]);document.getElementById('start').onclick=()=>{started=true;document.getElementById('overlay').style.display='none';show('案内',['黄色い◆が付いている村長に話しかけてください。'])};window.addEventListener('keydown',e=>{if(e.key==='ArrowUp')mv(0,-1,'up');if(e.key==='ArrowDown')mv(0,1,'down');if(e.key==='ArrowLeft')mv(-1,0,'left');if(e.key==='ArrowRight')mv(1,0,'right');if(e.key===' '||e.key==='Enter')talk()});
function music(){if(!audio){audio=new (window.AudioContext||window.webkitAudioContext)()}if(bgmOn){audio.suspend();bgmOn=false}else{audio.resume();bgmOn=true;loop()}document.getElementById('bgm').textContent=bgmOn?'BGM ON':'BGM OFF'}function loop(){if(!bgmOn)return;let now=audio.currentTime,notes=[261.63,329.63,392,523.25,392,329.63,293.66,349.23];notes.forEach((f,i)=>{let o=audio.createOscillator(),g=audio.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.035,now+i*.22);g.gain.exponentialRampToValueAtTime(.001,now+i*.22+.18);o.connect(g).connect(audio.destination);o.start(now+i*.22);o.stop(now+i*.22+.19)});setTimeout(loop,1760)}document.getElementById('bgm').onclick=music;
</script></body></html>
