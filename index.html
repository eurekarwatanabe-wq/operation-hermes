:root{

<body>
<div id="app">
<header><div><div class="eyebrow">VERSION 2.0 ALPHA</div><h1>MINPAKU QUEST</h1><div class="tagline">― 一軒の宿が、町の未来を変える。―</div></div><div id="stats"></div></header>
<div class="mobile-tools"><button id="menuBtn" type="button">メニュー</button><button id="bgmHeaderBtn" type="button">♪ BGM</button><button id="fullscreenBtn" type="button">全画面</button></div>
<main id="stage">
<canvas id="game" width="320" height="320"></canvas><div id="nextGuide">◆ 次の相手を案内します</div><div id="directionGuide">目的地</div>
<section id="titleScreen" class="overlay"><div class="panel title-panel"><div class="title-mark">⚕</div><h2>MINPAKU QUEST</h2><p>一軒の宿が、町の未来を変える。</p><button id="newGameBtn" class="primary">はじめから</button><button id="continueBtn">つづきから</button><div class="note">最初からエンディングまで遊べる完成ストーリー版</div></div></section>
<section id="setupScreen" class="overlay hidden"><div class="panel"><h2>主人公を決める</h2><label>名前</label><input id="playerName" maxlength="8" value="リュウ"><label>職業</label><select id="job"><option>サラリーマン</option><option>主婦</option><option>フリーランス</option><option>学生</option></select><button id="startBtn" class="primary">ユリイカ村へ</button></div></section>
<section id="dialog" class="dialog hidden"><div id="speaker"></div><div id="dialogText"></div><div id="choices"></div><div class="dialog-hint">TALK / タップで進む</div></section>
<section id="questPanel" class="side-panel hidden"><h3 id="questTitle"></h3><div id="questList"></div><button id="closeQuest">閉じる</button></section>
<section id="eventPanel" class="overlay hidden"><div class="panel" id="eventContent"></div></section>
<section id="mobileMenu" class="overlay menu-overlay hidden">
      <div class="panel">
        <h2>メニュー</h2>
        <button id="menuBgm">BGMを再生／停止</button><div id="bgmStatus">現在：停止中</div><button id="menuManage">民泊経営</button><button id="menuQuest">クエスト</button>
        <button id="menuSave">セーブ</button>
        <button id="menuClose" class="primary">ゲームに戻る</button>
      </div>
    </section>
    <div id="toast" class="toast hidden"></div>
</main>
<section id="controls"><div class="dpad"><button data-dir="up">▲</button><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div><div class="actions"><button id="talkBtn" class="primary">TALK</button><button id="questBtn">QUEST</button><button id="saveBtn">SAVE</button></div></section>
</div>
<script>
"use strict";

function playTone(freq,start,dur,type="square",gain=.025){
 const osc=audioCtx.createOscillator();
 const g=audioCtx.createGain();
 osc.type=type;
 osc.frequency.value=freq;
 g.gain.setValueAtTime(0.0001,start);
 g.gain.exponentialRampToValueAtTime(gain,start+.012);
 g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
 osc.connect(g);
 g.connect(audioCtx.destination);
 osc.start(start);
 osc.stop(start+dur+.03);
}
function bgmTick(){
 if(!bgmOn||!audioCtx)return;
 const now=audioCtx.currentTime+.025;
 const theme=themes[currentTheme()];
 const idx=bgmStep%theme.melody.length;
 playTone(theme.melody[idx],now,.21,"square",.022);
 if(bgmStep%2===0)playTone(theme.harmony[Math.floor(bgmStep/2)%theme.harmony.length],now,.32,"sine",.011);
 if(bgmStep%4===0)playTone(theme.bass[Math.floor(bgmStep/4)%theme.bass.length],now,.48,"triangle",.026);
 bgmStep++;
}

async function toggleBgm(event){
 if(event){
  event.preventDefault();
  event.stopPropagation();
 }
 try{
  if(!audioCtx){
   const AudioContextClass=window.AudioContext||window.webkitAudioContext;
   if(!AudioContextClass){
    toast("このブラウザはBGM再生に対応していません");
    return;
   }
   audioCtx=new AudioContextClass();
  }
  if(audioCtx.state==="suspended")await audioCtx.resume();

  bgmOn=!bgmOn;
  clearInterval(bgmTimer);
  bgmTimer=null;

  if(bgmOn){
   bgmStep=0;
   bgmTick();
   bgmTimer=setInterval(bgmTick,250);
   toast("BGMを再生しました");
  }else{
   toast("BGMを停止しました");
  }
  updateBgmUi();
 }catch(err){
  console.error(err);
  toast("もう一度BGMボタンを押してください");
 }
}

 <button onclick="openStyle('family')">家族向け・広いリビング<span class="choice-note">安定した評価。家族旅行の予約が増えます。</span></button>
 <button onclick="openStyle('local')" class="primary">地域体験・地元飲食店案内<span class="choice-note">口コミと村の活気が大きく上がります。</span></button>
 <button onclick="openStyle('beds')">ベッドを限界まで詰め込む<span class="choice-note">一時的に売上は出ますが、悪い口コミの危険があります。</span></button>`);
}
window.openStyle=function(style){
 let title="",body="",klass="";
 if(style==="local"){
  state.review=4.8;state.trust+=3;state.village+=8;state.money+=60000;state.bookings+=6;state.cleanliness=88;
  title="地域全体が宿の魅力になった！";
  body=`<p class="impact good">＋ ゲストから高評価の口コミ</p>
        <p class="impact good">＋ 売上 60,000G</p>
        <p class="impact good">＋ 地元飲食店にも客が流れ、村の活気が8上昇</p>`;
 }else if(style==="family"){
  state.review=4.5;state.trust+=2;state.village+=5;state.money+=50000;state.bookings+=5;state.cleanliness=84;
  title="家族旅行の予約が増えた！";
  body=`<p class="impact good">＋ 安定した口コミ評価</p>
        <p class="impact good">＋ 売上 50,000G</p>
        <p class="impact good">＋ 村の活気が5上昇</p>`;
 }else{
  state.review=3.2;state.trust-=2;state.village+=1;state.money+=70000;state.bookings+=7;state.cleanliness=58;klass="bad";
  title="定員は増えたが、悪い口コミが続いた";
  body=`<p class="impact good">＋ 短期売上 70,000G</p>
        <p class="impact bad">－ 「狭くて落ち着かない」と低評価</p>
        <p class="impact bad">－ 予約数が減り、今後の売上が大幅減少</p>
        <p class="impact bad">－ 信頼が2低下</p>`;
 }
 nextStep();nextStep();
 eventContent.innerHTML=`<h2>${title}</h2><div class="result-box ${klass}">${body}</div>
 <button class="primary" onclick="closeEvent()">次へ進む</button>`;
};

function troubleEvent(s){
 const events=[
  {title:"騒音苦情",q:"深夜2時、近隣から『うるさい』と連絡が来ました。",opts:[
   ["朝まで待つ",()=>badTrouble()],["すぐゲストへ連絡し、必要なら現地対応",()=>goodTrouble()],["近隣に我慢してもらう",()=>badTrouble()]
  ]},
  {title:"鍵が開かない",q:"外国人ゲストから『鍵が開かない』と連絡が来ました。",opts:[
   ["写真付き案内とビデオ通話で確認",()=>goodTrouble()],["既読だけつける",()=>badTrouble()],["レビュー後に対応",()=>badTrouble()]
  ]},
  {title:"清掃スタッフが来ない",q:"チェックイン2時間前、清掃未着手です。",opts:[
   ["代替スタッフを探し、ゲストにも早めに連絡",()=>goodTrouble(true)],["黙ってチェックインを遅らせる",()=>badTrouble()],["前のゲストのせいにする",()=>badTrouble()]
  ]}
 ][s];
 showEvent(events.title,`<p>${events.q}</p>`+events.opts.map((o,i)=>`<button ${i===1?"class='primary'":""} onclick="troubleChoice(${s},${i})">${o[0]}</button>`).join(""));
 window._trouble=events;
}
window.troubleChoice=function(s,i){window._trouble.opts[i][1]();};
function goodTrouble(clean=false){
 state.trust+=2;
 state.review=Math.min(5,(state.review||4)+0.1);
 if(clean)state.money-=5000;
 nextStep();
 eventContent.innerHTML=`<h2>迅速な対応でトラブルを収束</h2>
 <div class="result-box">
  <p class="impact good">＋ ゲストと近隣からの信頼が2上昇</p>
  <p class="impact good">＋ 口コミ評価が上昇</p>
  ${clean?'<p class="impact bad">－ 緊急清掃費5,000G</p>':''}
  <p>早い連絡と状況説明が、宿の営業を守りました。</p>
 </div><button class="primary" onclick="closeEvent()">次へ進む</button>`;
}
function badTrouble(){
 state.trust-=2;state.neighbors=Math.max(0,(state.neighbors||70)-18);
 state.review=Math.max(2,(state.review||4)-0.5);
 state.money=Math.max(0,state.money-20000);
 nextStep();
 eventContent.innerHTML=`<h2>対応が遅れ、問題が拡大</h2>
 <div class="result-box bad">
  <p class="impact bad">－ ゲストから悪い口コミ。予約と売上が大幅減少</p>
  <p class="impact bad">－ 近隣住民から行政へ苦情が入り、営業継続が危険に</p>
  <p class="impact bad">－ 改善しなければ宿の閉鎖につながります</p>
  <p class="impact bad">－ 損失20,000G／信頼2低下</p>
 </div><button class="primary" onclick="closeEvent()">改善して次へ進む</button>`;
}

function limitEvent(){
 showEvent("第七章　180日の壁",`<p class="question-help">営業日数が上限に近づきました。選択によって費用、売上、村への効果が変わります。</p>
 <button onclick="chooseLicense('minpaku')">民泊のまま、単価と質を高める<span class="choice-note">追加投資は少ない。営業日数内で高収益を目指します。</span></button>
 <button onclick="chooseLicense('ryokan')" class="primary">旅館業へ進化する<span class="choice-note">費用は必要ですが、年間営業を目指せます。</span></button>
 <button onclick="chooseLicense('expand')">別の地域にも一軒増やす<span class="choice-note">複数物件で売上を分散。ただし管理負担が増えます。</span></button>`);
}
window.chooseLicense=function(v){
 let title="",body="",klass="";
 state.license=v;
 if(v==="ryokan"){
  state.money-=30000;state.knowledge+=3;state.village+=10;state.trust+=2;
  title="旅館業へ進化した！";
  body=`<p class="impact bad">－ 改修・申請費30,000G</p>
        <p class="impact good">＋ 年間営業できる体制を獲得</p>
        <p class="impact good">＋ 雇用が生まれ、村の活気が10上昇</p>`;
 }else if(v==="minpaku"){
  state.money+=30000;state.review=Math.min(5,state.review+0.1);state.trust+=1;
  title="少ない営業日で高品質な宿へ";
  body=`<p class="impact good">＋ 高単価化で利益30,000G</p>
        <p class="impact good">＋ 口コミ評価が上昇</p>
        <p>ただし180日の営業上限は残ります。</p>`;
 }else{
  state.money-=20000;state.village+=6;state.trust+=1;
  title="二軒目の宿を開業した";
  body=`<p class="impact bad">－ 開業費20,000G</p>
        <p class="impact good">＋ 売上源が増え、村の活気が6上昇</p>
        <p class="impact bad">－ 管理負担が増えるため、体制整備が必要</p>`;
 }
 nextStep();
 eventContent.innerHTML=`<h2>${title}</h2><div class="result-box ${klass}">${body}</div>
 <button class="primary" onclick="closeEvent()">最終章へ</button>`;
};

function ending(){
 state.ending=true;
 eventPanel.scrollTop=0;
 const score=(state.review||0)*10+state.trust*2+state.knowledge+state.village+(state.neighbors||0)/5+(state.cleanliness||0)/5;
 let rank,title,story,bonus;
 if(score>=125){
  rank="Sランク：村を変えた伝説の宿";
  title="ユリイカ村、黄金時代へ";
  story="宿を中心に新しい店と仕事が生まれ、村は旅人が憧れる目的地になった。";
  bonus=150000;
 }else if(score>=100){
  rank="Aランク：愛される人気宿";
  title="村に笑顔が戻った";
  story="丁寧な運営と地域との連携が実り、宿は村の新しい顔になった。";
  bonus=100000;
 }else if(score>=75){
  rank="Bランク：堅実な宿";
  title="小さな明かりは消えない";
  story="派手ではないが、無理のない運営で宿と村の暮らしを守り続けた。";
  bonus=60000;
 }else{
  rank="Cランク：再建への第一歩";
  title="物語は、まだ途中";
  story="課題は残った。それでも失敗から学び、再び宿を立て直す道を選んだ。";
  bonus=20000;
 }
 state.endingRank=rank;
 state.money+=bonus;
 state.review=Math.max(state.review||0,3.5);
 showEvent("MINPAKU QUEST - END",`<div class="ending">
 <div class="ending-rank">${rank}</div>
 <h2>${title}</h2>
 <p>${story}</p>
 <p>橋の向こうへ、白髪の旅の行政書士が歩いていく。</p>
 <p><strong>「まだ宿のない町がある。」</strong></p>
 <hr>
 <p>最終評価：${state.review.toFixed(1)} ★<br>
 予約：${state.bookings||0}件／清掃品質：${state.cleanliness||0}<br>
 近隣関係：${state.neighbors||0}／村の活気：${state.village}<br>
 信頼：${state.trust}／知識：${state.knowledge}</p>
 <button onclick="saveGame(true)">エンディングをセーブ</button>
 <button class="primary" onclick="restartGame()">もう一度遊ぶ</button></div>`);
 saveGame(false);
 if(bgmOn){bgmStep=0;}
}
window.restartGame=function(){localStorage.removeItem(SAVE_KEY);location.reload();};

function front(){const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[state.player.dir];return{x:state.player.x+d[0],y:state.player.y+d[1]};}
function talk(){if(!state.started||state.ending)return;if(state.dialogOpen){showNextDialog();return;}const f=front(),n=npcs.find(n=>n.x===f.x&&n.y===f.y);if(n)talkTo(n.id);else toast("近くに話せる相手はいません");}
function solid(x,y){if(x<0||y<0||x>=MAP_W||y>=MAP_H)return true;if(water.has(`${x},${y}`))return true;if(trees.some(t=>t[0]===x&&t[1]===y))return true;if(buildings.some(b=>x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h))return true;if(npcs.some(n=>n.x===x&&n.y===y))return true;return false;}
function move(dx,dy,dir){if(!state.started||state.dialogOpen||!eventPanel.classList.contains("hidden"))return;state.player.dir=dir;const nx=state.player.x+dx,ny=state.player.y+dy;if(!solid(nx,ny)){state.player.x=nx;state.player.y=ny;state.walkFrame^=1;}}

function portraitMode(){
 return matchMedia("(max-width:700px) and (orientation:portrait)").matches;
}
function configureCanvas(){
 const portrait=portraitMode();
 const targetW=portrait?320:512;
 if(canvas.width!==targetW||canvas.height!==320){
  canvas.width=targetW;
  canvas.height=320;
  ctx.imageSmoothingEnabled=false;
 }
}
function cameraX(){
 if(!portraitMode())return 0;
 const desired=(state.player.x-10)*TILE;
 return Math.max(0,Math.min(MAP_W*TILE-canvas.width,desired));
}
function draw(){
 configureCanvas();
 updateGuide();
 const viewW=canvas.width;
 ctx.clearRect(0,0,viewW,320);
 if(!ready){
  ctx.fillStyle="#09131c";ctx.fillRect(0,0,viewW,320);
  ctx.fillStyle="#d3f6ff";ctx.font="bold 14px sans-serif";ctx.textAlign="center";
  ctx.fillText("ユリイカ村を読み込み中…",viewW/2,145);
  ctx.font="11px sans-serif";ctx.fillText(`${assetLoaded} / ${Object.keys(ASSET_DATA).length}`,viewW/2,166);
  ctx.textAlign="left";requestAnimationFrame(draw);return;
 }
 const cam=cameraX();
 ctx.save();
 ctx.translate(-cam,0);
 for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
  ctx.drawImage(assets.grass,x*TILE,y*TILE);
  if(roads.has(`${x},${y}`))ctx.drawImage(assets.road,x*TILE,y*TILE);
  if(water.has(`${x},${y}`))ctx.drawImage(assets[Math.floor(Date.now()/500)%2?"water1":"water0"],x*TILE,y*TILE);
  if(!roads.has(`${x},${y}`)&&!water.has(`${x},${y}`)&&((x*13+y*7)%17===0)){
   ctx.fillStyle="rgba(205,241,143,.32)";ctx.fillRect(x*TILE+3,y*TILE+5,2,1);ctx.fillRect(x*TILE+10,y*TILE+11,1,2);
  }
 }
 drawVillageChanges();
 drawPlaza();
 flowers.forEach(([x,y])=>ctx.drawImage(assets.flower,x*TILE,y*TILE));
 benches.forEach(([x,y])=>ctx.drawImage(assets.bench,x*TILE,y*TILE));
 lamps.forEach(([x,y])=>ctx.drawImage(assets.lamp,x*TILE,y*TILE));
 trees.forEach(([x,y])=>ctx.drawImage(assets.tree,x*TILE,y*TILE-4));
 buildings.forEach(b=>{
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.28)";ctx.shadowBlur=5;ctx.shadowOffsetY=3;
  ctx.drawImage(assets[b.kind],b.x*TILE,b.y*TILE);
  ctx.restore();
 });
 buildings.forEach(b=>label(b.name,(b.x+b.w/2)*TILE,(b.y+1)*TILE));
 npcs.forEach(drawNpc);
 drawPlayer();
 ctx.restore();
 drawTopBar();
 requestAnimationFrame(draw);
}
function drawVillageChanges(){
 // stone bridge and river bank detail
 ctx.fillStyle="#6f8790";ctx.fillRect(14*TILE,18*TILE,5*TILE,TILE);
 for(let x=14;x<=18;x++){ctx.fillStyle=x%2?"#aebdc0":"#92a6aa";ctx.fillRect(x*TILE,18*TILE,TILE,TILE);}
 ctx.strokeStyle="rgba(30,48,55,.55)";ctx.lineWidth=1;
 for(let x=14;x<=19;x++)ctx.beginPath(),ctx.moveTo(x*TILE,18*TILE),ctx.lineTo(x*TILE,19*TILE),ctx.stroke();
 if(state.chapter>=4){for(const [x,y] of [[3,8],[29,8],[8,16]])ctx.drawImage(assets.guest,x*TILE,y*TILE);}
 if(state.chapter>=7){for(const [x,y] of [[5,1],[27,1],[2,17],[29,17]])ctx.drawImage(assets.flower,x*TILE,y*TILE);}
}
function drawPlaza(){
 ctx.fillStyle="#d6c68e";ctx.fillRect(13*TILE,7*TILE,7*TILE,8*TILE);
 ctx.fillStyle="#8d7c58";ctx.fillRect(15*TILE,9*TILE,3*TILE,3*TILE);
 ctx.fillStyle="#b9d7df";ctx.fillRect(15*TILE+5,9*TILE+4,38,38);
 ctx.fillStyle="#2d87ad";ctx.fillRect(15*TILE+10,9*TILE+9,28,28);
 ctx.fillStyle="#8fe2ef";ctx.fillRect(16*TILE-2,9*TILE-5,4,17);
 ctx.fillStyle="rgba(255,255,255,.55)";ctx.fillRect(16*TILE,9*TILE-7,2,13);
}
function drawNpc(n){const img=assets[n.asset],sx=(Math.floor(Date.now()/450)%2)*16;ctx.drawImage(img,sx,0,16,16,n.x*TILE,n.y*TILE,16,16);if(n.id===currentTarget()){
 const bob=Math.floor(Date.now()/300)%2;
 ctx.fillStyle="#ffe56f";ctx.strokeStyle="#4b3610";ctx.lineWidth=1;
 ctx.beginPath();
 ctx.moveTo(n.x*TILE+8,n.y*TILE-11-bob);
 ctx.lineTo(n.x*TILE+14,n.y*TILE-5-bob);
 ctx.lineTo(n.x*TILE+8,n.y*TILE+1-bob);
 ctx.lineTo(n.x*TILE+2,n.y*TILE-5-bob);
 ctx.closePath();ctx.fill();ctx.stroke();
 ctx.fillStyle="rgba(4,11,18,.9)";
 ctx.fillRect(n.x*TILE-2,n.y*TILE-20-bob,20,7);
 ctx.fillStyle="#ffe56f";ctx.font="bold 6px sans-serif";ctx.textAlign="center";
 ctx.fillText("NEXT",n.x*TILE+8,n.y*TILE-14-bob);ctx.textAlign="left";
}}
function drawPlayer(){
 ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.ellipse(state.player.x*TILE+8,state.player.y*TILE+15,6,2,0,0,Math.PI*2);ctx.fill();
 ctx.drawImage(assets.player,state.walkFrame*16,0,16,16,state.player.x*TILE,state.player.y*TILE,16,16);
}
function label(t,x,y){
 ctx.save();ctx.font="bold 7px sans-serif";
 const w=Math.min(72,ctx.measureText(t).width+12),h=13;
 const px=Math.round(x-w/2),py=Math.round(y);
 ctx.fillStyle="rgba(5,15,24,.94)";ctx.strokeStyle="rgba(137,232,255,.82)";ctx.lineWidth=1;
 ctx.beginPath();if(ctx.roundRect)ctx.roundRect(px,py,w,h,4);else ctx.rect(px,py,w,h);ctx.fill();ctx.stroke();
 ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(t,x,py+h/2+.5);ctx.restore();
}
function drawTopBar(){
 const w=canvas.width;
 ctx.fillStyle="rgba(0,0,0,.74)";
 ctx.fillRect(0,0,w,18);
 ctx.fillStyle="#fff";
 ctx.font="9px monospace";
 const ch=chapters[Math.min(state.chapter,chapters.length-1)];
 const mission=ch.steps[Math.min(state.step,ch.steps.length-1)];
 const shortMission=mission.length>17?mission.slice(0,17)+"…":mission;
 ctx.fillText(`MISSION: ${shortMission}`,5,12);
 ctx.textAlign="right";
 ctx.fillText("ユリイカ村",w-5,12);
 ctx.textAlign="left";
}


function updateGuide(){
 const targetId=currentTarget(),target=npcs.find(n=>n.id===targetId);
 const guide=document.getElementById("nextGuide"),dirGuide=document.getElementById("directionGuide");
 if(!guide)return;
 if(state.ending){guide.textContent="物語は完結しました";if(dirGuide)dirGuide.textContent="END";return;}
 if(!target){guide.textContent="クエスト画面を確認しよう";if(dirGuide)dirGuide.textContent="目的地なし";return;}
 const dx=target.x-state.player.x,dy=target.y-state.player.y;
 const dist=Math.abs(dx)+Math.abs(dy);
 const dirs=[];
 if(dy<0)dirs.push("上");if(dy>0)dirs.push("下");if(dx<0)dirs.push("左");if(dx>0)dirs.push("右");
 guide.textContent=`次は「${target.name}」に話しかけよう`;
 if(dirGuide)dirGuide.textContent=`${dirs.join("・")||"すぐ近く"}／あと約${dist}マス`;
}

function renderQuest(){
 const ch=chapters[Math.min(state.chapter,chapters.length-1)];
 const targetId=currentTarget();
 const target=npcs.find(n=>n.id===targetId);
 questTitle.textContent=ch.title+(target?`｜次：${target.name}`:"");questList.innerHTML="";ch.steps.forEach((q,i)=>{const r=document.createElement("div");r.className="quest-row "+(i<state.step?"quest-done":i===state.step?"quest-current":"");r.textContent=(i<state.step?"✓ ":i===state.step?"▶ ":"□ ")+q;questList.appendChild(r);});}
newGameBtn.onclick=()=>{resetState();titleScreen.classList.add("hidden");setupScreen.classList.remove("hidden");};
continueBtn.onclick=()=>{if(!loadGame())toast("セーブデータがありません");};
startBtn.onclick=()=>{
 state.name=(playerName.value||"リュウ").trim();
 state.job=job.value;
 state.started=true;
 setupScreen.classList.add("hidden");
 updateStats();
 toast("黄色いダイヤと左上の案内を目印に進もう");
 talkTo("mayor");
};
talkBtn.onclick=talk;saveBtn.onclick=()=>saveGame(true);questBtn.onclick=()=>{renderQuest();questPanel.classList.remove("hidden");};closeQuest.onclick=()=>questPanel.classList.add("hidden");dialog.onclick=()=>{if(!state.choiceMode)showNextDialog();};
document.querySelectorAll("[data-dir]").forEach(b=>{const d=b.dataset.dir,m={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[d];let timer=null;const s=e=>{e.preventDefault();move(m[0],m[1],d);timer=setInterval(()=>move(m[0],m[1],d),140);};const t=e=>{e.preventDefault();if(timer){clearInterval(timer);timer=null;}};b.addEventListener("mousedown",s);b.addEventListener("mouseup",t);b.addEventListener("mouseleave",t);b.addEventListener("touchstart",s,{passive:false});b.addEventListener("touchend",t,{passive:false});});
addEventListener("keydown",e=>{const m={ArrowUp:[0,-1,"up"],ArrowDown:[0,1,"down"],ArrowLeft:[-1,0,"left"],ArrowRight:[1,0,"right"]}[e.key];if(m){e.preventDefault();move(...m);}if(e.key==="Enter"||e.key===" "){e.preventDefault();talk();}});
updateStats();
requestAnimationFrame(draw);
</script>
</body>
</html>
